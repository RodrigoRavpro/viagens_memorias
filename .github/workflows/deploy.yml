name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main        # dispara sempre que houver push na branch main
  workflow_dispatch: # permite rodar manualmente pelo painel do GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload dos arquivos estáticos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # envia a raiz do repositório (onde está o index.html)

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
